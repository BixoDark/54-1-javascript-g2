<div id="seccion-1">
    <h2>Primera sección</h2>
    <p>Elemento 1</p>
    <p>Elemento 2</p>
    <p>Elemento 3</p>
    <p>Elemento 4</p>
    <p>Elemento 5</p>
</div>


<script>

    //CAPTURA PRIMER PÁRRAFO DE LA SECCIÓN 1
    const primerParrafo = document.querySelector("#seccion-1 p:first-of-type");
    console.log(primerParrafo);
    primerParrafo.style.color = "orange";

    //CAPTURAMOS EL EL TERCER PARRAFO (N PARRAFO)
    const tercerParrafo = document.querySelector("#seccion-1 p:nth-child(4)");
    tercerParrafo.style.color = "red";

    //CAPTURAMOS EL EL ÚLTIMO PARRAFO
    const ultimoParrafo = document.querySelector("#seccion-1 p:last-child");
    ultimoParrafo.style.color = "green";

</script>
