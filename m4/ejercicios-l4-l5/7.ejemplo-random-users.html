<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo Consumo API</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


        <style>
            .card .card-img-top{
                aspect-ratio: 3/2;
            }
        </style>

</head>

<body>

    <header class="py-3">
        <h1 class="text-center">EJEMPLO CONSUMO API</h1>
    </header>

    <main class="container">

        <section class="py-3">
            <h2 class="text-center">Información de usuarios.</h2>

            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card">
                        <img src="https://img.magnific.com/psd-premium/3-d-ilustracion-icono-eliminacion-contrasena_727843-2393.jpg" class="card-img-top" alt="..." id="usuario-imagen">
                        <div class="card-body text-center">
                            <h5 class="card-title" id="usuario-nombre">Nombre usuario</h5>
                            <p class="card-text" id="usuario-celular">Número celular</p>
                        </div>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item" id="usuario-email">Email</li>
                            <li class="list-group-item" id="usuario-pais">country</li>
                        </ul>
                    </div>
                </div>
                <div class="py-3 d-flex justify-content-center">
                    <button class="btn btn-primary" id="btn-cambiar-usuario">Cambiar usuario</button>
                </div>
            </div>
        </section>

    </main>





    <script>

        const getUser = async () => {
            try {
                const URL = "https://randomuser.me/api/";
                const response = await fetch(URL);
                const data = await response.json();

                const user = data.results[0];

                return user;

            } catch (error) {
                console.log(error);
            }
        }


        const mostrarUsuario = (usuario) => {

            let { name, location, email, cell, picture} = usuario

            let nombre = name.first;
            let apellido = name.last;
            let pais = location.country;
            let imagen = picture.large;

            document.getElementById("usuario-nombre").textContent = `${nombre} ${apellido}`;
            document.getElementById("usuario-pais").textContent = pais;
            document.getElementById("usuario-email").textContent = email;
            document.getElementById("usuario-celular").textContent = cell;

            const imagenEl = document.getElementById("usuario-imagen");
            imagenEl.setAttribute("src", imagen);
        }


        //EVENTO CAMBIAR USUARIO

        const btnCambiarUsuario = document.getElementById("btn-cambiar-usuario");

        btnCambiarUsuario.addEventListener("click", async () => {

            try {
                
                const usuario = await getUser();

                mostrarUsuario(usuario);

            } catch (error) {
                console.log(error);
            }

        })

    </script>
</body>

</html>
