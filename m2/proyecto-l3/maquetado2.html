<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Maquetado Flexbox</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
        }

        .frame {
            max-width: 960px;
            margin: 24px auto;
            border: 3px solid #111;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 640px;
        }

        /* Header / Title */
        header.title {
            background: #f3f3f3;
            padding: 24px 16px;
            text-align: center;
            border-bottom: 2px solid #cfcfcf;
        }

        header.title h1 {
            margin: 0;
            font-weight: 600;
        }

        /* Nav */
        nav.topbar {
            background: #ececec;
            padding: 12px 16px;
            text-align: center;
            border-bottom: 2px solid #cfcfcf;
        }

        /* Main area: index (sidebar) + content */
        main {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex: 1 1 auto;
        }

        aside.index {
            width: 240px;
            background: #fafafa;
            padding: 20px;
            border-right: 2px solid #cfcfcf;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        section.content {
            flex: 1 1 auto;
            background: #fff;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Footer */
        footer.site {
            background: #f3f3f3;
            padding: 16px;
            text-align: center;
            border-top: 2px solid #cfcfcf;
        }

        /* Text styles to mimic the wireframe */
        .wire-label {
            color: #222;
            font-size: 1.1rem;
        }

        /* Responsive: stack index above content on narrow screens */
        @media (max-width: 720px) {
            .frame {
                margin: 12px;
            }

            main {
                flex-direction: column;
                padding: 12px;
            }

            aside.index {
                width: auto;
                border-right: none;
                border-bottom: 2px solid #cfcfcf;
                padding: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="frame">
        <div class="container">
            <header class="title">
                <h1 class="wire-label">Title Section</h1>
            </header>

            <nav class="topbar wire-label">Nav Bar</nav>

            <main>
                <aside class="index wire-label">Index Section</aside>
                <section class="content wire-label">Content Section</section>
            </main>

            <footer class="site wire-label">Footer Section</footer>
        </div>
    </div>
</body>

</html>
