<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo flexbox</title>

    <style>

        body{
            margin: 0;
        }

        .caja {
            width: 50%;
            height: 100%;
            display: inline-block;
        }

        .contenedor {
            display: flex;
            background-color: grey;
            height: 300px;
            align-items: center;
        }

        #caja1 {
            background-color: red;
        }

        #caja2 {
            background-color: violet;
        }

    </style>
</head>
<body>

    <div class="contenedor">
        <div id="caja1" class="caja">
            
        </div>
        <div id="caja2" class="caja">
            
        </div>
    </div>

    <style>
        .contenedor2 {
            height: 300px;
            background-color: green;
            display:flex;
            justify-content: center;
        }

        #caja4 {
            height: 300px;
            width: 33%;
            background-color: orange;
        }
        #caja5 {
            height: 300px;
            width: 33%;
            background-color: purple;
        }
        #caja6 {
            height: 300px;
            width: 33%;
            background-color: brown;
        }
    </style>

    <div class="contenedor2">
        <div id="caja4"></div>
        <div id="caja5"></div>
        <div id="caja6"></div>
    </div>


    
</body>
</html>
